<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 280" fill="none">
  <defs>
    <linearGradient id="goldPlate" x1="0" y1="0" x2="240" y2="280" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#E4CF9F"/>
      <stop offset="0.5" stop-color="#C6A667"/>
      <stop offset="1" stop-color="#AD8B49"/>
    </linearGradient>
    <linearGradient id="plateBg" x1="0" y1="0" x2="0" y2="280" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#5C5A62"/>
      <stop offset="1" stop-color="#413F48"/>
    </linearGradient>
    <radialGradient id="plateSheen" cx="0.5" cy="0.4" r="0.75">
      <stop offset="0" stop-color="#6B6872" stop-opacity="0.55"/>
      <stop offset="0.55" stop-color="#55535B" stop-opacity="0"/>
      <stop offset="1" stop-color="#3A3840" stop-opacity="0.4"/>
    </radialGradient>
    <linearGradient id="silverScrew" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#F5F5F0"/>
      <stop offset="1" stop-color="#A8A8A0"/>
    </linearGradient>
  </defs>

  <rect x="0" y="0" width="240" height="280" rx="6" fill="url(#plateBg)"/>
  <rect x="0" y="0" width="240" height="280" rx="6" fill="url(#plateSheen)"/>

  <g><circle cx="22" cy="22" r="5" fill="url(#silverScrew)"/><line x1="18" y1="22" x2="26" y2="22" stroke="#3E3C44" stroke-width="0.8"/></g>
  <g><circle cx="218" cy="22" r="5" fill="url(#silverScrew)"/><line x1="214" y1="22" x2="222" y2="22" stroke="#3E3C44" stroke-width="0.8"/></g>
  <g><circle cx="22" cy="258" r="5" fill="url(#silverScrew)"/><line x1="18" y1="258" x2="26" y2="258" stroke="#3E3C44" stroke-width="0.8"/></g>
  <g><circle cx="218" cy="258" r="5" fill="url(#silverScrew)"/><line x1="214" y1="258" x2="222" y2="258" stroke="#3E3C44" stroke-width="0.8"/></g>

  <!-- thin-line КА monogram -->
  <g transform="translate(63 40)" stroke-width="4.5" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <g stroke="url(#goldPlate)">
      <!-- К -->
      <path d="M12 6 V80"/>
      <path d="M12 43 L40 6"/>
      <path d="M12 43 L40 80"/>
      <!-- А: right leg + crossbar -->
      <path d="M70 6 L84 80"/>
      <path d="M60 58 H80"/>
    </g>
    <!-- А left leg — white accent -->
    <path d="M56 80 L70 6" stroke="#FBFAF7"/>
  </g>

  <text x="120" y="172" font-family="Georgia, 'Cormorant Garamond', serif" font-size="18" font-weight="600" letter-spacing="2.5" fill="url(#goldPlate)" text-anchor="middle">КАБАЛЬ АНАСТАСІЯ</text>
  <text x="120" y="195" font-family="Georgia, 'Cormorant Garamond', serif" font-size="14" font-weight="500" letter-spacing="3" fill="url(#goldPlate)" text-anchor="middle">ІГОРІВНА</text>

  <line x1="80" y1="212" x2="160" y2="212" stroke="url(#goldPlate)" stroke-width="0.8" opacity="0.6"/>

  <text x="120" y="234" font-family="Georgia, serif" font-size="9" letter-spacing="2.5" fill="url(#goldPlate)" text-anchor="middle" opacity="0.85">АДВОКАТ · ЛЬВІВ</text>
  <text x="120" y="254" font-family="Georgia, serif" font-size="11" letter-spacing="1" fill="url(#goldPlate)" text-anchor="middle">+38 (095) 672 80 05</text>
</svg>
